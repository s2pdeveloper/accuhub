<header class="header">
    <div class="header-inner">
        <a href="#" class="logo" (click)="closeMenu()" aria-label="Acchub Capital home">
            <img src="assets/header-logo.png" alt="Acchub Capital" class="logo-img" />
        </a>

        <nav class="nav" [class.open]="menuOpen()" aria-label="Main navigation">
            <a href="#home" class="nav-link" (click)="closeMenu()">Home</a>
            <a href="#services" class="nav-link" (click)="closeMenu()">Services</a>
            <a href="#about" class="nav-link" (click)="closeMenu()">About Us</a>
            <a href="#testimonials" class="nav-link" (click)="closeMenu()">Testimonials</a>
            <a href="#contact" class="nav-link" (click)="closeMenu()">Contact</a>
            <a href="#contact" class="btn btn-nav" (click)="closeMenu()">Get a Quote</a>
        </nav>

        <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()"
            aria-label="Toggle navigation">
            <span class="hamburger-line" [class.open]="menuOpen()"></span>
        </button>
    </div>
</header>
